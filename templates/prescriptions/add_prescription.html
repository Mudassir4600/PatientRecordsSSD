{% extends 'shared/base.html' %}
{% block title %}Issue Prescription{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('prescriptions.list_prescriptions') }}"
       class="btn btn-outline-secondary me-3">
        <i class="fas fa-arrow-left"></i>
    </a>
    <h3 class="fw-bold mb-0">
        <i class="fas fa-prescription me-2 text-primary"></i>Issue Prescription
    </h3>
</div>

<div class="card p-4">
    <form method="POST" action="{{ url_for('prescriptions.add_prescription') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">
                    Patient <span class="text-danger">*</span>
                </label>
                {% if patients %}
                <select name="patient_email" class="form-select" required>
                    <option value="">Select patient...</option>
                    {% for patient in patients %}
                    <option value="{{ patient.email }}">
                        {{ patient.full_name }} ({{ patient.email }})
                    </option>
                    {% endfor %}
                </select>
                {% else %}
                <div class="alert alert-warning">No patients registered yet.</div>
                {% endif %}
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">
                    Medication Name <span class="text-danger">*</span>
                </label>
                <input type="text" name="medication" class="form-control"
                       placeholder="e.g. Metformin" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label fw-semibold">
                    Dosage <span class="text-danger">*</span>
                </label>
                <input type="text" name="dosage" class="form-control"
                       placeholder="e.g. 500mg" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-semibold">
                    Frequency <span class="text-danger">*</span>
                </label>
                <select name="frequency" class="form-select" required>
                    <option value="">Select...</option>
                    <option value="Once daily">Once daily</option>
                    <option value="Twice daily">Twice daily</option>
                    <option value="Three times daily">Three times daily</option>
                    <option value="Every 8 hours">Every 8 hours</option>
                    <option value="As needed">As needed</option>
                </select>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-semibold">Duration</label>
                <input type="text" name="duration" class="form-control"
                       placeholder="e.g. 30 days">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">Additional Notes</label>
            <textarea name="notes" class="form-control" rows="3"
                      placeholder="Any special instructions or notes..."></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
                <i class="fas fa-file-prescription me-2"></i>Issue Prescription
            </button>
            <a href="{{ url_for('prescriptions.list_prescriptions') }}"
               class="btn btn-outline-secondary px-4">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
