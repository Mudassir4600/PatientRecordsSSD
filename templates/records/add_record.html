{% extends 'shared/base.html' %}
{% block title %}Add Patient Record{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('records.list_records') }}" class="btn btn-outline-secondary me-3">
        <i class="fas fa-arrow-left"></i>
    </a>
    <h3 class="fw-bold mb-0"><i class="fas fa-user-plus me-2 text-primary"></i>Add Patient Record</h3>
</div>

<div class="card p-4">
    <form method="POST" action="{{ url_for('records.add_record') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
                <input type="text" name="full_name" class="form-control" placeholder="Patient full name" required>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label fw-semibold">Age <span class="text-danger">*</span></label>
                <input type="number" name="age" class="form-control" placeholder="Age" min="0" max="120" required>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label fw-semibold">Sex <span class="text-danger">*</span></label>
                <select name="sex" class="form-select" required>
                    <option value="">Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Blood Pressure (mmHg)</label>
                <input type="text" name="blood_pressure" class="form-control" placeholder="e.g. 120">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Cholesterol (mg/dl)</label>
                <input type="text" name="cholesterol" class="form-control" placeholder="e.g. 200">
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label fw-semibold">Fasting Blood Sugar &gt;120 mg/dl</label>
                <select name="fasting_blood_sugar" class="form-select">
                    <option value="">Unknown</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-semibold">Resting ECG</label>
                <select name="resting_ecg" class="form-select">
                    <option value="">Unknown</option>
                    <option value="Normal">Normal</option>
                    <option value="Abnormal">Abnormal</option>
                </select>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-semibold">Exercise-Induced Angina</label>
                <select name="exercise_angina" class="form-select">
                    <option value="">Unknown</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">Clinical Notes</label>
            <textarea name="notes" class="form-control" rows="4"
                      placeholder="Enter any relevant clinical observations..."></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
                <i class="fas fa-save me-2"></i>Save Record
            </button>
            <a href="{{ url_for('records.list_records') }}" class="btn btn-outline-secondary px-4">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
